name: MLB K-Prop Pipeline

# Replaces the 3 Perplexity "computer" scheduled tasks with free GitHub Actions
# compute. Same 3 trigger times, but now running plain Python instead of
# paying an LLM agent to re-derive the same steps every day.
#
# IMPORTANT — each scheduled trigger (11am / 5:30pm / 6am) spins up a
# completely separate, fresh runner — nothing carries over between them
# automatically. So the "Commit outputs" step at the bottom pushes
# workspace/ back into the repo after every run, which is how the 5:30pm
# job can see the 11am job's results, and how the next morning's 6am
# backtest can see yesterday's AM/late results. Don't remove that step.
#
# IMPORTANT — the one manual step this doesn't remove:
#   FanGraphs' full leaderboard is paywalled, AND FanGraphs blocks requests
#   from cloud/datacenter IPs (like GitHub Actions runners) with a 403 even
#   for the free leaderboard — confirmed by testing fangraphs_stats_puller.py
#   live. That script is still in this repo for reference (or in case you
#   ever want to try running it from your own machine/network, where it
#   might work), but it is NOT wired into this workflow.
#   Drop your exported fangraphs-leaderboards*.csv into workspace/ and
#   commit/push it BEFORE the 11am ET run, same as before. Everything else
#   below is fully automatic.

on:
  schedule:
    - cron: "0 15 * * *"   # 11:00 AM ET (EDT/UTC-4) — AM full-slate run
    - cron: "30 21 * * *"  # 5:30 PM ET (EDT/UTC-4) — late-slate refresh
    - cron: "0 10 * * *"   # 6:00 AM ET (EDT/UTC-4) — prior day's backtest
  workflow_dispatch:        # manual "Run workflow" button for testing

permissions:
  contents: write   # needed so the pipeline can commit its own outputs back

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine ET date
        id: dt
        run: |
          echo "today=$(TZ=America/New_York date +%F)" >> "$GITHUB_OUTPUT"
          echo "yesterday=$(TZ=America/New_York date -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"
          echo "year=$(TZ=America/New_York date +%Y)" >> "$GITHUB_OUTPUT"

      # ── 11:00 AM ET — AM full slate ──────────────────────────────────────
      - name: AM slate pull + model run + workbook
        if: github.event.schedule == '0 15 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          DATE=${{ steps.dt.outputs.today }}
          python mlb_slate_puller.py "$DATE" --out "workspace/slate_${DATE}_am.json"
          python savant_pull.py ${{ steps.dt.outputs.year }}
          python run_model.py "$DATE" --slate am
          python build_workbook.py "$DATE" --slate am

      # ── 5:30 PM ET — late slate refresh ──────────────────────────────────
      - name: Late slate pull + model run + workbook
        if: github.event.schedule == '30 21 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          DATE=${{ steps.dt.outputs.today }}
          python mlb_slate_puller.py "$DATE" --late-after 19:00 --out "workspace/slate_${DATE}_late.json"
          python run_model.py "$DATE" --slate late
          python add_line_movement.py "$DATE"
          python build_workbook.py "$DATE" --slate late

      # ── 6:00 AM ET — grade yesterday's picks ─────────────────────────────
      - name: Backtest yesterday's slate
        if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          YDATE=${{ steps.dt.outputs.yesterday }}
          python mlb_results_puller.py "$YDATE" --out "workspace/results_${YDATE}.json"
          python build_backtest.py "$YDATE"

      - name: Upload outputs (for easy download)
        uses: actions/upload-artifact@v4
        with:
          name: kprop-outputs-${{ steps.dt.outputs.today }}
          path: |
            workspace/*.xlsx
            workspace/*.csv
            workspace/*.json
          retention-days: 30

      - name: Commit outputs back to repo
        if: always()
        run: |
          git config user.name "kprop-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add workspace/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Pipeline run: ${{ steps.dt.outputs.today }} (${{ github.event.schedule || 'manual' }})"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
